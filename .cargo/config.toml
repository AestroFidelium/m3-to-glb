[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[profile.release]
opt-level = 3
lto = "thin"      # Link Time Optimization
codegen-units = 1 # better inlining, slower build
panic = "abort"   # removes unwinding overhead
strip = true      # drop debug symbols

[profile.dev]
opt-level = 0                 # fast compile
codegen-backend = "cranelift" # enable when nightly is available

[profile.dev.package."*"]
opt-level = 3 # dependencies are always optimised

[unstable]
codegen-backend = true

[build]
rustflags = ["-Z", "polonius"]
